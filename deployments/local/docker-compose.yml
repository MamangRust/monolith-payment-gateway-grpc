services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: DRAGON
      POSTGRES_PASSWORD: DRAGON
      POSTGRES_DB: PAYMENT_GATEWAY
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"             
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "effective_cache_size=12GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_line_prefix=%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
      - "-c"
      - "superuser_reserved_connections=10"
      - "-c"
      - "idle_in_transaction_session_timeout=60000" 
      - "-c"
      - "statement_timeout=30000"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U DRAGON -d PAYMENT_GATEWAY"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    
    environment:
      DATA_SOURCE_NAME: "postgresql://DRAGON:DRAGON@postgres:5432/PAYMENT_GATEWAY?sslmode=disable&connect_timeout=10"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
    
    ports:
      - "9187:9187"
    
    depends_on:
      - postgres
    
    networks:
      - app_network
    
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer_debug
    restart: unless-stopped

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: DRAGON
      DB_PASSWORD: DRAGON
      DB_NAME: PAYMENT_GATEWAY

      AUTH_TYPE: scram-sha-256

      POOL_MODE: transaction

      DEFAULT_POOL_SIZE: 200
      MIN_POOL_SIZE: 50
      MAX_DB_CONNECTIONS: 800
      MAX_CLIENT_CONN: 10000
      RESERVE_POOL_SIZE: 100
      RESERVE_POOL_TIMEOUT: 5

      SERVER_IDLE_TIMEOUT: 600
      QUERY_TIMEOUT: 30
      SERVER_CONNECT_TIMEOUT: 10
      SERVER_LOGIN_RETRY: 5

      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_RESET_QUERY_ALWAYS: 0

      TCP_KEEPALIVE: 1
      TCP_KEEPCNT: 5
      TCP_KEEPIDLE: 30
      TCP_KEEPINTVL: 10

      ADMIN_USERS: DRAGON
      STATS_USERS: DRAGON

      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_POOLER_ERRORS: 1

    ports:
      - "6432:5432"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app_network

    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=DRAGON psql -h localhost -p 5432 -U DRAGON -d pgbouncer -c 'SHOW POOLS;' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s


  pyroscope:
    image: grafana/pyroscope:latest
    ports:
    - 4040:4040
    networks:
      - app_network

  redis-auth:
    image: redis:7.4
    container_name: redis_auth_debug
    command: >
      redis-server
      --requirepass dragon_knight
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --maxclients 10000
    ports:
      - "6380:6379"
    volumes:
      - redis_auth_data:/data 
    restart: unless-stopped

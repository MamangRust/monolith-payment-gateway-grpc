syntax = "proto3";

option go_package = 'github.com/MamangRust/monolith-payment-gateway-pb/common';

package pb.common;

message PaginationMeta {
  int32 current_page = 1;
  int32 page_size = 2;
  int32 total_pages = 3;
  int32 total_records = 4;
}

message ErrorResponse {
  string status = 1;
  string message = 2;
  int32 code = 3;
}
syntax = "proto3";

option go_package = 'github.com/MamangRust/monolith-payment-gateway-pb/withdraw';

package pb.withdraw;

import "withdraw/withdraw.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message CreateWithdrawRequest {
  string card_number = 1;
  int32 withdraw_amount = 2;
  google.protobuf.Timestamp withdraw_time = 3;
}

message UpdateWithdrawRequest {
  int32 withdraw_id = 1;
  string card_number = 2;
  int32 withdraw_amount = 3;
  google.protobuf.Timestamp withdraw_time = 4;
}

message ApiResponseWithdrawDelete {
  string status = 1;
  string message = 2;
}

message ApiResponseWithdrawAll {
  string status = 1;
  string message = 2;
}

service WithdrawCommandService {
  rpc CreateWithdraw(CreateWithdrawRequest) returns (ApiResponseWithdraw);
  rpc UpdateWithdraw(UpdateWithdrawRequest) returns (ApiResponseWithdraw);
  rpc TrashedWithdraw(FindByIdWithdrawRequest)
      returns (ApIResponseWithdrawDeleteAt);
  rpc RestoreWithdraw(FindByIdWithdrawRequest)
      returns (ApIResponseWithdrawDeleteAt);
  rpc DeleteWithdrawPermanent(FindByIdWithdrawRequest)
      returns (ApiResponseWithdrawDelete);

  rpc RestoreAllWithdraw(google.protobuf.Empty)
      returns (ApiResponseWithdrawAll) {}
  rpc DeleteAllWithdrawPermanent(google.protobuf.Empty)
      returns (ApiResponseWithdrawAll) {}
}
syntax = "proto3";

option go_package = 'github.com/MamangRust/monolith-payment-gateway-pb/user';

package pb.user;

import "google/protobuf/wrappers.proto";

message FindAllUserRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}

message FindByIdUserRequest { int32 id = 1; }

message UserResponse {
  int32 id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
  string created_at = 5;
  string updated_at = 6;
}

message UserResponseDeleteAt {
  int32 id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
  string created_at = 5;
  string updated_at = 6;
  google.protobuf.StringValue deleted_at = 7;
}

message ApiResponseUser {
  string status = 1;
  string message = 2;
  UserResponse data = 3;
}

message ApiResponseUserDeleteAt {
  string status = 1;
  string message = 2;
  UserResponseDeleteAt data = 3;
}

message ApiResponsesUser {
  string status = 1;
  string message = 2;
  repeated UserResponse data = 3;
}

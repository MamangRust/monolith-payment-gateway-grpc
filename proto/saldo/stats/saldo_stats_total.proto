syntax = "proto3";

option go_package = 'github.com/MamangRust/monolith-payment-gateway-pb/saldo/stats';

package pb.saldo.stats;

import "saldo/saldo.proto";

message SaldoMonthTotalBalanceResponse {
  string month = 1;
  string year = 2;
  int32 total_balance = 3;
}

message SaldoYearTotalBalanceResponse {
  string year = 1;
  int32 total_balance = 2;
}

message ApiResponseMonthTotalSaldo {
  string status = 1;
  string message = 2;
  repeated SaldoMonthTotalBalanceResponse data = 3;
}

message ApiResponseYearTotalSaldo {
  string status = 1;
  string message = 2;
  repeated SaldoYearTotalBalanceResponse data = 3;
}

service SaldoStatsTotalBalance {
  rpc FindMonthlyTotalSaldoBalance(FindMonthlySaldoTotalBalance)
      returns (ApiResponseMonthTotalSaldo) {}
  rpc FindYearTotalSaldoBalance(FindYearlySaldo)
      returns (ApiResponseYearTotalSaldo) {}
}
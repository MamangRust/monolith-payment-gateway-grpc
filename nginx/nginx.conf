user nginx;
worker_processes auto;
worker_rlimit_nofile 300000;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 32768;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ================= LOG FORMAT =================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'rt=$request_time '
                    'uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" '
                    'urt="$upstream_response_time" '
                    'cache="$upstream_cache_status"';

    access_log /var/log/nginx/access.log main buffer=64k flush=3s;

    # ================= CORE PERFORMANCE =================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 30;
    keepalive_requests 20000;

    reset_timedout_connection on;
    client_body_timeout 15;
    client_header_timeout 15;
    send_timeout 15;

    # ================= BUFFER =================
    client_body_buffer_size 256k;
    client_max_body_size 20m;
    large_client_header_buffers 8 32k;

    # ================= GZIP =================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ================= CACHE CONFIG =================
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:200m
        max_size=5g
        inactive=2m
        use_temp_path=off;

    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_background_update on;

    # ================= UPSTREAM =================
    upstream backend {
        server apigateway:5000 max_fails=3 fail_timeout=10s;
        keepalive 4096;
    }

    # ================= SERVER =================
    server {
        listen 80 reuseport backlog=65535;
        server_name _;

        # ================= DEFAULT PROXY SETTINGS =================
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;

        # =========================================================
        # 🚀 CARD QUERY (NO CACHE — REALTIME DATA)
        # =========================================================
        location ~ ^/api/card-query {
            proxy_cache off;
            proxy_pass http://backend;
        }

        # =========================================================
        # 🚀 CARD DASHBOARD (CACHE SHORT TTL)
        # =========================================================
        location ~ ^/api/card-dashboard {
            proxy_cache api_cache;
            proxy_cache_valid 200 15s;
            proxy_cache_valid 404 5s;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;

            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://backend;
        }

        # =========================================================
        # 🚀🔥 ALL CARD STATS ENDPOINTS (HEAVY CACHE)
        # =========================================================
        location ~ ^/api/card-stats- {
            proxy_cache api_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 10s;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://backend;
        }

        # =========================================================
        # FALLBACK
        # =========================================================
        location / {
            proxy_pass http://backend;
        }
    }
}
